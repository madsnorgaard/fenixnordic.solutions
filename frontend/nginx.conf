server {
    listen 80;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 256;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: no cache (for updates to reach users)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Security headers managed by Traefik global middleware + per-service fenix-headers middleware
    # Do NOT add security headers here — they duplicate/conflict with Traefik (e.g., nginx DENY vs Traefik SAMEORIGIN)
}
