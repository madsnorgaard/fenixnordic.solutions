networks:
  web:
    external: true
  internal:
    external: false

services:
  fenix_db:
    image: mariadb:11
    container_name: fenix_db
    env_file:
    - .env
    restart: always
    user: "1000"
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - ./data/mysql:/var/lib/mysql
    labels:
      - "traefik.enable=false" # Disable Traefik for this service
    networks:
      - internal

  phpmyadmin:
    container_name: fenix_db_admin
    image: phpmyadmin/phpmyadmin
    env_file:
    - .env
    ports:
      - 9899:80
    restart: always
    user: "1000"
    environment:
      PMA_HOST: "${DB_HOST}"
      PMA_USER: "${DB_USER}"
      PMA_PASSWORD: "${DB_PASS}"
      PMA_ARBITRARY: "1"
    labels:
      - "traefik.http.routers.fenix_phpmyadmin.rule=Host(`phpmyadmin.fenixnordic.solutions`)"
      - "traefik.http.routers.fenix_phpmyadmin.tls=true"
      - "traefik.http.routers.fenix_phpmyadmin.tls.certresolver=lets-encrypt"
    networks:
      - internal
      - web
    depends_on:
      - fenix_db

  wordpress:
    image: wordpress:php8.2-apache
    container_name: fenix_wp
    env_file:
      - .env
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: fenix_db
      WORDPRESS_DB_NAME: "${DB_NAME}"
      WORDPRESS_DB_USER: "${DB_USER}"
      WORDPRESS_DB_PASSWORD: "${DB_PASS}"
      WORDPRESS_TABLE_PREFIX: "wp_"
    volumes:
      - ./data/wp-content:/var/www/html/wp-content
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fenix_wp.rule=Host(`cms.fenixnordic.solutions`)"
      - "traefik.http.routers.fenix_wp.entrypoints=websecure"
      - "traefik.http.routers.fenix_wp.tls=true"
      - "traefik.http.routers.fenix_wp.tls.certresolver=lets-encrypt"
      - "traefik.http.services.fenix_wp.loadbalancer.server.port=80"
    networks:
      - internal
      - web
    depends_on:
      - fenix_db

  nuxt:
    container_name: fenix_nuxt
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fenix_nuxt.rule=Host(`fenixnordic.solutions`)"
      - "traefik.http.routers.fenix_nuxt.entrypoints=websecure"
      - "traefik.http.routers.fenix_nuxt.tls=true"
      - "traefik.http.routers.fenix_nuxt.tls.certresolver=lets-encrypt"
      - "traefik.http.services.fenix_nuxt.loadbalancer.server.port=80"
    networks:
      - web

  fenix_redis:
    image: library/redis:latest
    container_name: fenix_redis
    volumes:
      - ./data/redis:/data
    command: ["redis-server"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 20s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  fenix_solr:
    image: solr:8.11.2
    container_name: fenix_solr
    volumes:
      - ./data/solr:/var/solr
      - ./solr/fenix:/opt/solr/server/solr/fenix
    restart: unless-stopped
    networks:
      - internal
