networks:
  web:
    external: true
  internal:
    external: false

services:
  fenix_db:
    image: mariadb:11
    container_name: fenix_db
    env_file:
    - .env
    restart: always
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASS}"
      MYSQL_RANDOM_ROOT_PASSWORD: "1"
    volumes:
      - ./data/mysql:/var/lib/mysql
    labels:
      - "traefik.enable=false"
    networks:
      - internal


  nuxt:
    container_name: fenix_nuxt
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fenix_nuxt.rule=Host(`fenixnordic.solutions`)"
      - "traefik.http.routers.fenix_nuxt.entrypoints=websecure"
      - "traefik.http.routers.fenix_nuxt.tls=true"
      - "traefik.http.routers.fenix_nuxt.tls.certresolver=lets-encrypt"
      - "traefik.http.services.fenix_nuxt.loadbalancer.server.port=80"
    networks:
      - web

  mailer:
    container_name: fenix_mailer
    build:
      context: ./mailer
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # More specific rule → higher priority than fenix_nuxt, so /api/* goes here
      - "traefik.http.routers.fenix_mailer.rule=Host(`fenixnordic.solutions`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.fenix_mailer.entrypoints=websecure"
      - "traefik.http.routers.fenix_mailer.tls=true"
      - "traefik.http.routers.fenix_mailer.tls.certresolver=lets-encrypt"
      - "traefik.http.services.fenix_mailer.loadbalancer.server.port=80"
    networks:
      - web

  fenix_redis:
    image: library/redis:latest
    container_name: fenix_redis
    volumes:
      - ./data/redis:/data
    command: ["redis-server"]
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 20s
      retries: 10
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"

  fenix_solr:
    image: solr:8.11.2
    container_name: fenix_solr
    volumes:
      - ./data/solr:/var/solr
      - ./solr/fenix:/opt/solr/server/solr/fenix
    restart: unless-stopped
    networks:
      - internal
